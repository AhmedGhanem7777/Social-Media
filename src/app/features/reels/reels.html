<div class="fixed inset-0 bg-black" [dir]="lang.direction()">

    <!-- Scroll container: snap-y snap-mandatory -->
    <div #scrollContainer class="h-full overflow-y-scroll snap-y snap-mandatory scrollbar-hide">
        @for (reel of reels; track reel.id; let index = $index) {
        <div class="h-full w-full snap-start relative flex items-center justify-center">

            <!-- Background image (simulating video) -->
            <img [src]="reel.video" alt="" class="absolute inset-0 w-full h-full object-cover" />

            <!-- Gradient overlays -->
            <div class="absolute inset-0 bg-gradient-to-b from-black/30 via-transparent to-black/60"></div>

            <!-- Play/Pause tap overlay -->
            <button type="button" class="absolute inset-0 flex items-center justify-center z-10" (click)="togglePlay()"
                aria-label="Toggle play">
                @if (!isPlaying()) {
                <div class="w-20 h-20 rounded-full bg-white/20 backdrop-blur-sm
                            flex items-center justify-center animate-scale-in">
                    <!-- Play icon -->
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-10 h-10 text-white fill-white ms-1"
                        viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="0">
                        <polygon points="5 3 19 12 5 21 5 3" />
                    </svg>
                </div>
                }
            </button>

            <!-- ── Right-side actions ──────────────────────────── -->
            <div class="absolute right-4 bottom-32 flex flex-col items-center gap-6 z-20">

                <!-- Like -->
                <button type="button" class="flex flex-col items-center gap-1" (click)="toggleLike(reel.id)"
                    aria-label="Like">
                    <div class="w-12 h-12 rounded-full backdrop-blur-sm flex items-center justify-center transition-all"
                        [class]="isLiked(reel.id) ? 'bg-red-500/20' : 'bg-white/10'">
                        <svg xmlns="http://www.w3.org/2000/svg" class="w-7 h-7 transition-all" viewBox="0 0 24 24"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                            [class]="isLiked(reel.id)
                      ? 'fill-red-500 text-red-500 like-burst'
                      : 'text-white fill-none'">
                            <path
                                d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z" />
                        </svg>
                    </div>
                    <span class="text-white text-xs font-medium">{{ reel.likes }}</span>
                </button>

                <!-- Comment -->
                <button type="button" class="flex flex-col items-center gap-1" aria-label="Comment">
                    <div class="w-12 h-12 rounded-full bg-white/10 backdrop-blur-sm flex items-center justify-center">
                        <svg xmlns="http://www.w3.org/2000/svg" class="w-7 h-7 text-white" viewBox="0 0 24 24"
                            fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                            stroke-linejoin="round">
                            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" />
                        </svg>
                    </div>
                    <span class="text-white text-xs font-medium">{{ reel.comments }}</span>
                </button>

                <!-- Share -->
                <button type="button" class="flex flex-col items-center gap-1" aria-label="Share">
                    <div class="w-12 h-12 rounded-full bg-white/10 backdrop-blur-sm flex items-center justify-center">
                        <svg xmlns="http://www.w3.org/2000/svg" class="w-7 h-7 text-white" viewBox="0 0 24 24"
                            fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                            stroke-linejoin="round">
                            <circle cx="18" cy="5" r="3" />
                            <circle cx="6" cy="12" r="3" />
                            <circle cx="18" cy="19" r="3" />
                            <line x1="8.59" x2="15.42" y1="13.51" y2="17.49" />
                            <line x1="15.41" x2="8.59" y1="6.51" y2="10.49" />
                        </svg>
                    </div>
                    <span class="text-white text-xs font-medium">Share</span>
                </button>

                <!-- Mute / Unmute -->
                <button type="button" (click)="toggleMute()" aria-label="Toggle mute">
                    <div class="w-12 h-12 rounded-full bg-white/10 backdrop-blur-sm flex items-center justify-center">
                        @if (isMuted()) {
                        <!-- VolumeX -->
                        <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6 text-white" viewBox="0 0 24 24"
                            fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                            stroke-linejoin="round">
                            <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5" />
                            <line x1="22" x2="16" y1="9" y2="15" />
                            <line x1="16" x2="22" y1="9" y2="15" />
                        </svg>
                        } @else {
                        <!-- Volume2 -->
                        <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6 text-white" viewBox="0 0 24 24"
                            fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                            stroke-linejoin="round">
                            <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5" />
                            <path d="M15.54 8.46a5 5 0 0 1 0 7.07" />
                            <path d="M19.07 4.93a10 10 0 0 1 0 14.14" />
                        </svg>
                        }
                    </div>
                </button>

                <!-- User avatar + follow badge -->
                <div class="relative">
                    <div class="w-12 h-12 rounded-full ring-2 ring-white overflow-hidden">
                        <img [src]="reel.user.avatar" [alt]="reel.user.name" class="w-full h-full object-cover" />
                    </div>
                    <div class="absolute -bottom-2 left-1/2 -translate-x-1/2
                            w-6 h-6 rounded-full bg-primary
                            flex items-center justify-center text-primary-foreground text-lg leading-none">
                        +
                    </div>
                </div>
            </div>

            <!-- ── Bottom info ─────────────────────────────────── -->
            <div class="absolute bottom-6 left-4 right-20 z-20">
                <div class="flex items-center gap-2 mb-2">
                    <span class="font-bold text-white">&#64;{{ reel.user.username }}</span>
                    <!-- Follow button: variant="outline" size="sm" -->
                    <button type="button" class="inline-flex items-center justify-center gap-2 whitespace-nowrap rounded-md
                         text-xs font-medium ring-offset-background transition-all duration-300
                         focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2
                         disabled:pointer-events-none disabled:opacity-50 active:scale-[0.98]
                         border border-white/50 bg-transparent text-white hover:bg-white/20
                         h-7 px-3">
                        Follow
                    </button>
                </div>
                <p class="text-white text-sm">{{ reel.caption }}</p>
            </div>

            <!-- ── Progress indicators ────────────────────────── -->
            <div class="absolute top-4 left-0 right-0 flex gap-1 px-4 z-20">
                @for (r of reels; track r.id; let i = $index) {
                <div class="flex-1 h-0.5 rounded-full overflow-hidden transition-all"
                    [class]="i <= activeIndex() ? 'bg-white/80' : 'bg-white/30'">
                    @if (i === activeIndex() && isPlaying()) {
                    <div class="h-full bg-white rounded-full animate-[progress_5s_linear_forwards]"></div>
                    }
                </div>
                }
            </div>

        </div>
        }
    </div>

    <!-- Back button -->
    <button type="button" (click)="goBack()" class="absolute top-4 left-4 z-30
               inline-flex items-center justify-center gap-2 whitespace-nowrap rounded-lg
               text-sm font-medium ring-offset-background transition-all duration-300
               focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2
               disabled:pointer-events-none disabled:opacity-50 active:scale-[0.98]
               text-white hover:bg-white/20 h-10 w-10" aria-label="Go back">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6 shrink-0" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M19 12H5" />
            <path d="m12 19-7-7 7-7" />
        </svg>
    </button>
</div>
