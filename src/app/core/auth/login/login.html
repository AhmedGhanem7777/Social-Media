<div class="min-h-screen flex items-center justify-center bg-background p-4 relative overflow-hidden"
    [dir]="languageService.direction()">

    <!-- Background decoration -->
    <div class="absolute inset-0 overflow-hidden pointer-events-none">
        <div
            class="absolute -top-1/2 -left-1/2 w-full h-full bg-gradient-to-br from-primary/20 via-transparent to-transparent rounded-full blur-3xl animate-pulse-soft">
        </div>
        <div class="absolute -bottom-1/2 -right-1/2 w-full h-full bg-gradient-to-tl from-accent/20 via-transparent to-transparent rounded-full blur-3xl animate-pulse-soft"
            style="animation-delay:1s"></div>
    </div>

    <!-- Theme & Language toggles — Button: variant="ghost" size="icon" -->
    <div class="absolute top-4 right-4 flex gap-2 z-10">
        <button type="button" (click)="themeService.toggleTheme()" class="inline-flex items-center justify-center gap-2 whitespace-nowrap rounded-lg text-sm font-medium cursor-pointer
                 ring-offset-background transition-all duration-300
                 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2
                 disabled:pointer-events-none disabled:opacity-50
                 hover:bg-accent hover:text-accent-foreground active:scale-[0.98]
                 h-10 w-10" aria-label="Toggle theme">
            @if (themeService.theme() === 'dark') {
            <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 pointer-events-none shrink-0" viewBox="0 0 24 24"
                fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="4" />
                <path
                    d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41" />
            </svg>
            } @else {
            <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 pointer-events-none shrink-0" viewBox="0 0 24 24"
                fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z" />
            </svg>
            }
        </button>

        <button type="button" (click)="toggleLanguage()" class="inline-flex items-center justify-center gap-2 whitespace-nowrap rounded-lg text-sm font-medium cursor-pointer
                 ring-offset-background transition-all duration-300
                 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2
                 disabled:pointer-events-none disabled:opacity-50
                 hover:bg-accent hover:text-accent-foreground active:scale-[0.98]
                 h-10 w-10" aria-label="Toggle language">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 pointer-events-none shrink-0" viewBox="0 0 24 24"
                fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="10" />
                <path d="M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20" />
                <path d="M2 12h20" />
            </svg>
        </button>
    </div>

    <div class="w-full max-w-md z-10 animate-fade-in-up">

        <!-- Logo -->
        <div class="text-center mb-8">
            <div class="inline-flex items-center gap-3 mb-4">
                <div class="w-14 h-14 rounded-2xl bg-gradient-primary flex items-center justify-center shadow-glow">
                    <span class="text-white font-bold text-3xl">S</span>
                </div>
            </div>
            <h1 class="text-3xl font-bold bg-gradient-to-r from-primary to-accent bg-clip-text text-transparent">
                Social
            </h1>
        </div>

        <!-- Card: variant="elevated" + backdrop-blur-sm -->
        <div class="rounded-xl bg-card text-card-foreground shadow-soft transition-all duration-300 backdrop-blur-sm">

            <!-- CardHeader + text-center -->
            <div class="flex flex-col space-y-1.5 p-5 text-center">
                <h3 class="text-xl font-semibold leading-none tracking-tight">
                    {{ languageService.t('auth.welcomeBack') }}
                </h3>
                <p class="text-sm text-muted-foreground">
                    {{ languageService.t('auth.loginSubtitle') }}
                </p>
            </div>

            <!-- CardContent -->
            <div class="p-5 pt-0">
                @if (errorMessage()) {
                <div
                    class="mb-4 p-3 rounded-lg bg-destructive/10 border border-destructive/20 text-destructive text-sm flex items-center gap-3 animate-in fade-in slide-in-from-top-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 shrink-0" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10" />
                        <line x1="12" x2="12" y1="8" y2="12" />
                        <line x1="12" x2="12.01" y1="16" y2="16" />
                    </svg>
                    <span>{{ errorMessage() }}</span>
                </div>
                }

                <form (submit)="handleSubmit($event)" class="space-y-4">

                    <!-- Email — Input: variant="social" inputSize="lg" icon=Mail iconPosition="left" -->
                    <div class="space-y-2">
                        <label class="text-sm font-medium">
                            {{ languageService.t('auth.emailOrUsername') }}
                        </label>
                        <div class="relative">
                            <div
                                class="absolute left-3 rtl:left-auto rtl:right-3 top-1/2 -translate-y-1/2 text-muted-foreground pointer-events-none">
                                <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" viewBox="0 0 24 24" fill="none"
                                    stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                    stroke-linejoin="round">
                                    <rect width="20" height="16" x="2" y="4" rx="2" />
                                    <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7" />
                                </svg>
                            </div>
                            <input [formField]="loginForm.emailOrUserName" type="text"
                                [placeholder]="languageService.t('auth.emailOrUsernamePlaceholder')" class="flex w-full rounded-lg border ring-offset-background transition-all duration-300
                           file:border-0 file:bg-transparent file:text-sm file:font-medium file:text-foreground
                           placeholder:text-muted-foreground focus-visible:outline-none
                           disabled:cursor-not-allowed disabled:opacity-50 md:text-sm
                           border-border bg-card
                           focus-visible:ring-2 focus-visible:ring-primary/50
                           focus-visible:border-primary/50 focus-visible:shadow-glow
                           h-12 text-base px-5
                           pl-10 rtl:pl-5 rtl:pr-10" />
                        </div>
                    </div>

                    <!-- Password — Input: variant="social" inputSize="lg" icon=Lock iconPosition="left" -->
                    <div class="space-y-2">
                        <label class="text-sm font-medium">
                            {{ languageService.t('auth.password') }}
                        </label>
                        <div class="relative">
                            <div
                                class="absolute left-3 rtl:left-auto rtl:right-3 top-1/2 -translate-y-1/2 text-muted-foreground pointer-events-none">
                                <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" viewBox="0 0 24 24" fill="none"
                                    stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                    stroke-linejoin="round">
                                    <rect width="18" height="11" x="3" y="11" rx="2" ry="2" />
                                    <path d="M7 11V7a5 5 0 0 1 10 0v4" />
                                </svg>
                            </div>
                            <input [formField]="loginForm.password" [type]="showPassword() ? 'text' : 'password'"
                                placeholder="••••••••" class="flex w-full rounded-lg border ring-offset-background transition-all duration-300
                           placeholder:text-muted-foreground focus-visible:outline-none
                           disabled:cursor-not-allowed disabled:opacity-50 md:text-sm
                           border-border bg-card
                           focus-visible:ring-2 focus-visible:ring-primary/50
                           focus-visible:border-primary/50 focus-visible:shadow-glow
                           h-12 text-base px-5
                           pl-10 rtl:pl-5 rtl:pr-10" />
                            <!-- Button: variant="ghost" size="iconSm" — absolute right-2 rtl:right-auto rtl:left-2 -->
                            <button type="button" (click)="toggleShowPassword()" class="absolute right-2 rtl:right-auto rtl:left-2 top-1/2 -translate-y-1/2 cursor-pointer
                           inline-flex items-center justify-center gap-2 whitespace-nowrap rounded-lg
                           text-sm font-medium ring-offset-background transition-all duration-300
                           focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2
                           disabled:pointer-events-none disabled:opacity-50
                           hover:bg-accent hover:text-accent-foreground active:scale-[0.98]
                           h-8 w-8" [attr.aria-label]="showPassword() ? 'Hide password' : 'Show password'">
                                @if (showPassword()) {
                                <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 pointer-events-none shrink-0"
                                    viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                                    stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M9.88 9.88a3 3 0 1 0 4.24 4.24" />
                                    <path
                                        d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68" />
                                    <path d="M6.61 6.61A13.526 13.526 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61" />
                                    <line x1="2" x2="22" y1="2" y2="22" />
                                </svg>
                                } @else {
                                <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 pointer-events-none shrink-0"
                                    viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                                    stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z" />
                                    <circle cx="12" cy="12" r="3" />
                                </svg>
                                }
                            </button>
                        </div>
                    </div>

                    <!-- Forgot password — Button: variant="link" -->
                    <div class="flex justify-end">
                        <a routerLink="/forgot-password" class="text-sm font-medium text-primary underline-offset-4 hover:underline
                         transition-all duration-300 focus-visible:outline-none px-0 cursor-pointer">
                            {{ languageService.t('auth.forgotPassword') }}
                        </a>
                    </div>

                    <!-- Submit — Button: variant="gradient" size="xl" -->
                    <button type="submit" [disabled]="isLoading()" class="inline-flex items-center justify-center gap-2 whitespace-nowrap cursor-pointer
                       w-full h-14 rounded-xl px-10 text-lg font-semibold
                       ring-offset-background transition-all duration-300
                       focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2
                       disabled:pointer-events-none disabled:opacity-50
                       bg-gradient-primary text-white hover:opacity-90 hover:shadow-glow active:scale-[0.98]
                       group">
                        @if (isLoading()) {
                        <div class="w-5 h-5 border-2 border-white/30 border-t-white rounded-full animate-spin"></div>
                        {{ languageService.t('common.loading') }}
                        } @else {
                        {{ languageService.t('auth.login') }}
                        <svg xmlns="http://www.w3.org/2000/svg"
                            class="w-5 h-5 pointer-events-none shrink-0 group-hover:translate-x-1 rtl:group-hover:-translate-x-1 rtl:rotate-180 transition-transform"
                            viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" stroke-linejoin="round">
                            <path d="M5 12h14" />
                            <path d="m12 5 7 7-7 7" />
                        </svg>
                        }
                    </button>

                </form>
            </div>

            <!-- CardFooter: flex-col gap-4 -->
            <div class="flex flex-col gap-4 p-5 pt-0">

                <!-- Register link -->
                <p class="text-center text-sm text-muted-foreground">
                    {{ languageService.t('auth.noAccount') }}&nbsp;
                    <a routerLink="/register" class="text-primary hover:underline underline-offset-4 font-medium cursor-pointer">
                        {{ languageService.t('auth.register') }}
                    </a>
                </p>

            </div>
        </div>
    </div>
</div>
