<nav class="fixed top-0 left-0 right-0 z-50 glass border-b border-border/50">
    <div class="container mx-auto px-4">
        <div class="flex items-center justify-between h-16">

            <!-- Logo -->
            <a routerLink="/" class="flex items-center gap-2 group">
                <div class="w-10 h-10 rounded-xl bg-gradient-primary flex items-center justify-center
                        shadow-glow group-hover:scale-105 transition-transform">
                    <span class="text-white font-bold text-xl">S</span>
                </div>
                <span class="hidden sm:block text-xl font-bold bg-gradient-to-r from-primary to-accent
                         bg-clip-text text-transparent">
                    Social
                </span>
            </a>

            <!-- Search — desktop; Input variant="social" -->
            <div class="hidden md:flex flex-1 max-w-md mx-8">
                <div class="relative w-full">
                    <div class="absolute left-3 rtl:left-auto rtl:right-3 top-1/2 -translate-y-1/2
                          text-muted-foreground pointer-events-none">
                        <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="11" cy="11" r="8" />
                            <path d="m21 21-4.3-4.3" />
                        </svg>
                    </div>
                    <input type="search" [placeholder]="lang.t('nav.search')" class="flex w-full rounded-lg border ring-offset-background transition-all duration-300
                       placeholder:text-muted-foreground focus-visible:outline-none
                       disabled:cursor-not-allowed disabled:opacity-50 md:text-sm h-11
                       border-border bg-card
                       focus-visible:ring-2 focus-visible:ring-primary/50
                       focus-visible:border-primary/50 focus-visible:shadow-glow
                       pl-10 rtl:pl-4 rtl:pr-10 pr-4" />
                </div>
            </div>

            <!-- Desktop nav links -->
            <div class="hidden lg:flex items-center gap-1">
                @for (item of navItems; track item.path) {
                <a [routerLink]="item.path">
                    <button type="button" class="inline-flex items-center justify-center gap-2 whitespace-nowrap rounded-lg
                         text-sm font-medium ring-offset-background transition-all duration-300
                         focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2
                         disabled:pointer-events-none disabled:opacity-50
                         h-12 px-8 text-base active:scale-[0.98]" [class]="isActive(item.path)
                    ? 'bg-gradient-primary text-white hover:opacity-90 shadow-glow'
                    : 'hover:bg-accent hover:text-accent-foreground'">
                        <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 pointer-events-none shrink-0"
                            viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" stroke-linejoin="round">
                            @switch (item.icon) {
                            @case ('home') {
                            <path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
                            <polyline points="9 22 9 12 15 12 15 22" />
                            }
                            @case ('film') {
                            <rect width="18" height="18" x="3" y="3" rx="2" />
                            <path d="M7 3v18M17 3v18M3 7h4M17 7h4M3 12h18M3 17h4M17 17h4" />
                            }
                            @case ('message') {
                            <path d="M7.9 20A9 9 0 1 0 4 16.1L2 22Z" />
                            }
                            }
                        </svg>
                        <span class="hidden xl:inline">{{ lang.t(item.label) }}</span>
                    </button>
                </a>
                }
            </div>

            <!-- Right section -->
            <div class="flex items-center gap-2">

                <!-- Create — Button variant="gradient" size="icon" -->
                <button type="button" class="hidden sm:inline-flex items-center justify-center gap-2 whitespace-nowrap rounded-lg
                     text-sm font-medium ring-offset-background transition-all duration-300
                     focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2
                     disabled:pointer-events-none disabled:opacity-50
                     bg-gradient-primary text-white hover:opacity-90 hover:shadow-glow active:scale-[0.98]
                     h-10 w-10">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 pointer-events-none shrink-0"
                        viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round">
                        <path d="M5 12h14" />
                        <path d="M12 5v14" />
                    </svg>
                </button>

                <!-- Notifications — Button variant="ghost" size="icon" -->
                <button type="button" class="relative inline-flex items-center justify-center gap-2 whitespace-nowrap rounded-lg
                     text-sm font-medium ring-offset-background transition-all duration-300
                     focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2
                     disabled:pointer-events-none disabled:opacity-50
                     hover:bg-accent hover:text-accent-foreground active:scale-[0.98] h-10 w-10">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 pointer-events-none shrink-0"
                        viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round">
                        <path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9" />
                        <path d="M10.3 21a1.94 1.94 0 0 0 3.4 0" />
                    </svg>
                    <span class="absolute top-1 right-1 w-2 h-2 bg-accent rounded-full animate-pulse"></span>
                </button>

                <!-- Theme — Button variant="ghost" size="icon" -->
                <button type="button" (click)="theme.toggleTheme()" class="hidden sm:inline-flex items-center justify-center gap-2 whitespace-nowrap rounded-lg
                     text-sm font-medium ring-offset-background transition-all duration-300
                     focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2
                     disabled:pointer-events-none disabled:opacity-50
                     hover:bg-accent hover:text-accent-foreground active:scale-[0.98] h-10 w-10">
                    @if (theme.theme() === 'dark') {
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 pointer-events-none shrink-0"
                        viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round">
                        <circle cx="12" cy="12" r="4" />
                        <path
                            d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41" />
                    </svg>
                    } @else {
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 pointer-events-none shrink-0"
                        viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round">
                        <path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z" />
                    </svg>
                    }
                </button>

                <!-- Language — Button variant="ghost" size="icon" -->
                <button type="button" (click)="toggleLanguage()" class="hidden sm:inline-flex items-center justify-center gap-2 whitespace-nowrap rounded-lg
                     text-sm font-medium ring-offset-background transition-all duration-300
                     focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2
                     disabled:pointer-events-none disabled:opacity-50
                     hover:bg-accent hover:text-accent-foreground active:scale-[0.98] h-10 w-10">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 pointer-events-none shrink-0"
                        viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10" />
                        <path d="M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20" />
                        <path d="M2 12h20" />
                    </svg>
                    <span class="sr-only">{{ lang.language() === 'en' ? 'AR' : 'EN' }}</span>
                </button>

                <!-- Profile dropdown -->
                <div class="relative">
                    <button type="button" (click)="toggleProfileMenu()" class="inline-flex items-center justify-center gap-2 whitespace-nowrap rounded-full
                       text-sm font-medium ring-offset-background transition-all duration-300
                       focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2
                       disabled:pointer-events-none disabled:opacity-50
                       hover:bg-accent hover:text-accent-foreground active:scale-[0.98] h-10 w-10">
                        <div class="w-9 h-9 rounded-full ring-2 ring-primary/20 hover:ring-primary/50
                            transition-all overflow-hidden">
                            <img src="https://images.unsplash.com/photo-1472099645785-5658abf4ff4e?w=100&h=100&fit=crop&crop=face"
                                alt="Profile" class="w-full h-full object-cover" />
                        </div>
                    </button>

                    @if (showProfileMenu()) {
                    <!-- Backdrop -->
                    <div class="fixed inset-0 z-40" (click)="closeProfileMenu()"></div>
                    <!-- Dropdown — w-56 bg-popover border-border -->
                    <div
                        class="absolute end-0 mt-1 w-56 rounded-lg bg-popover border border-border shadow-soft z-50 overflow-hidden py-1 animate-scale-in">

                        <a routerLink="/profile" (click)="closeProfileMenu()"
                            class="flex items-center gap-2 px-3 py-2 text-sm hover:bg-accent transition-colors cursor-pointer">
                            <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 shrink-0" viewBox="0 0 24 24"
                                fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                stroke-linejoin="round">
                                <path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2" />
                                <circle cx="12" cy="7" r="4" />
                            </svg>
                            {{ lang.t('nav.profile') }}
                        </a>

                        <!-- Theme toggle (mobile only) -->
                        <button type="button" (click)="theme.toggleTheme(); closeProfileMenu()"
                            class="sm:hidden flex w-full items-center gap-2 px-3 py-2 text-sm hover:bg-accent transition-colors">
                            <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 shrink-0" viewBox="0 0 24 24"
                                fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                stroke-linejoin="round">
                                @if (theme.theme() === 'dark') {
                                <circle cx="12" cy="12" r="4" />
                                <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2" />
                                } @else {
                                <path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z" />
                                }
                            </svg>
                            {{ theme.theme() === 'dark' ? lang.t('common.lightMode') : lang.t('common.darkMode') }}
                        </button>

                        <!-- Language (mobile only) -->
                        <button type="button" (click)="toggleLanguage(); closeProfileMenu()"
                            class="sm:hidden flex w-full items-center gap-2 px-3 py-2 text-sm hover:bg-accent transition-colors">
                            <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 shrink-0" viewBox="0 0 24 24"
                                fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                stroke-linejoin="round">
                                <circle cx="12" cy="12" r="10" />
                                <path d="M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20" />
                                <path d="M2 12h20" />
                            </svg>
                            {{ lang.language() === 'en' ? 'العربية' : 'English' }}
                        </button>

                        <div class="my-1 h-px bg-border"></div>

                        <button type="button" (click)="LogOut()"
                            class="flex w-full items-center gap-2 px-3 py-2 text-sm text-destructive hover:bg-accent transition-colors">
                            {{ lang.t('nav.logout') }}
                        </button>
                    </div>
                    }
                </div>

                <!-- Mobile menu button — Button variant="ghost" size="icon" -->
                <button type="button" class="lg:hidden inline-flex items-center justify-center gap-2 whitespace-nowrap rounded-lg
                     text-sm font-medium ring-offset-background transition-all duration-300
                     focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2
                     disabled:pointer-events-none disabled:opacity-50
                     hover:bg-accent hover:text-accent-foreground active:scale-[0.98] h-10 w-10">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 pointer-events-none shrink-0"
                        viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round">
                        <line x1="4" x2="20" y1="12" y2="12" />
                        <line x1="4" x2="20" y1="6" y2="6" />
                        <line x1="4" x2="20" y1="18" y2="18" />
                    </svg>
                </button>

            </div>
        </div>
    </div>
</nav>
