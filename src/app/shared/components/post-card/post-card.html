<!-- Card: variant="elevated" hover-lift overflow-hidden -->
<div class="rounded-xl bg-card text-card-foreground shadow-soft transition-all duration-300 hover-lift overflow-hidden">

    <!-- CardHeader: flex flex-row items-center justify-between p-4 -->
    <div class="flex flex-row items-center justify-between p-4">
        <div class="flex items-center gap-3">
            <!-- Avatar w-11 h-11 -->
            <div
                class="w-11 h-11 rounded-full ring-2 ring-primary/20 hover:ring-primary/50 transition-all cursor-pointer overflow-hidden flex-shrink-0">
                <img [src]="user().avatar" [alt]="user().name" class="w-full h-full object-cover" />
            </div>
            <div>
                <p class="font-semibold text-sm hover:underline cursor-pointer">{{ user().name }}</p>
                <p class="text-xs text-muted-foreground">&#64;{{ user().username }} · {{ timeAgo() }}</p>
            </div>
        </div>

        <!-- MoreHorizontal dropdown — Button variant="ghost" size="iconSm" -->
        <div class="relative">
            <button type="button" (click)="toggleMoreMenu()" class="inline-flex items-center justify-center gap-2 whitespace-nowrap rounded-lg text-sm font-medium
                   ring-offset-background transition-all duration-300
                   focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2
                   disabled:pointer-events-none disabled:opacity-50
                   hover:bg-accent hover:text-accent-foreground active:scale-[0.98] h-8 w-8">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 pointer-events-none shrink-0" viewBox="0 0 24 24"
                    fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="1" />
                    <circle cx="19" cy="12" r="1" />
                    <circle cx="5" cy="12" r="1" />
                </svg>
            </button>

            @if (showMoreMenu()) {
            <!-- Backdrop -->
            <div class="fixed inset-0 z-40" (click)="closeMoreMenu()"></div>
            <!-- DropdownMenuContent align="end" -->
            <div
                class="absolute end-0 mt-1 w-40 rounded-lg bg-popover border border-border shadow-soft z-50 overflow-hidden animate-scale-in py-1">
                <button type="button" (click)="closeMoreMenu()"
                    class="w-full text-start px-3 py-2 text-sm hover:bg-accent transition-colors">
                    Save post
                </button>
                <button type="button" (click)="closeMoreMenu()"
                    class="w-full text-start px-3 py-2 text-sm hover:bg-accent transition-colors">
                    Hide post
                </button>
                <button type="button" (click)="closeMoreMenu()"
                    class="w-full text-start px-3 py-2 text-sm hover:bg-accent transition-colors text-destructive">
                    Report
                </button>
            </div>
            }
        </div>
    </div>

    <!-- CardContent: px-4 pb-3 -->
    <div class="px-4 pb-3">
        <p class="text-sm leading-relaxed whitespace-pre-wrap">{{ content() }}</p>
    </div>

    <!-- Post image -->
    @if (image()) {
    <div class="relative group">
        <img [src]="image()" alt="Post content" class="w-full object-cover max-h-[500px]" />
        <div
            class="absolute inset-0 bg-gradient-to-t from-black/20 to-transparent opacity-0 group-hover:opacity-100 transition-opacity">
        </div>
    </div>
    }

    <!-- Stats row — CardContent px-4 py-3 -->
    <div class="px-4 py-3">
        <div class="flex items-center justify-between text-sm text-muted-foreground">
            <div class="flex items-center gap-1">
                <div class="flex -space-x-1">
                    <div class="w-5 h-5 rounded-full bg-red-500 flex items-center justify-center">
                        <svg xmlns="http://www.w3.org/2000/svg" class="w-3 h-3 text-white fill-white"
                            viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                            stroke-linejoin="round">
                            <path
                                d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z" />
                        </svg>
                    </div>
                </div>
                <span>{{ likeCount() }}</span>
            </div>
            <div class="flex gap-4">
                <span class="hover:underline cursor-pointer">{{ comments() }} {{ lang.t('feed.comment') }}s</span>
                <span class="hover:underline cursor-pointer">{{ shares() }} {{ lang.t('feed.share') }}s</span>
            </div>
        </div>
    </div>

    <!-- CardFooter: px-4 py-2 border-t flex-col gap-3 -->
    <div class="px-4 py-2 border-t border-border flex flex-col gap-3">
        <div class="flex items-center justify-between w-full">
            <div class="flex items-center gap-1">

                <!-- Like — Button variant="ghost" + conditional text-red-500 -->
                <button type="button" (click)="handleLike()" class="inline-flex items-center justify-center gap-2 whitespace-nowrap rounded-lg text-sm font-medium
                     ring-offset-background transition-all duration-300
                     focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2
                     disabled:pointer-events-none disabled:opacity-50
                     hover:bg-accent hover:text-accent-foreground active:scale-[0.98]
                     px-4 py-2 h-10 flex-1" [class.text-red-500]="isLiked()">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 transition-all"
                        [class.fill-current]="isLiked()" [class.like-burst]="isLiked()" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path
                            d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z" />
                    </svg>
                    <span class="hidden sm:inline">{{ lang.t('feed.like') }}</span>
                </button>

                <!-- Comment — Button variant="ghost" -->
                <button type="button" (click)="toggleComments()" class="inline-flex items-center justify-center gap-2 whitespace-nowrap rounded-lg text-sm font-medium
                     ring-offset-background transition-all duration-300
                     focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2
                     disabled:pointer-events-none disabled:opacity-50
                     hover:bg-accent hover:text-accent-foreground active:scale-[0.98]
                     px-4 py-2 h-10 flex-1">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 pointer-events-none shrink-0"
                        viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round">
                        <path d="M7.9 20A9 9 0 1 0 4 16.1L2 22Z" />
                    </svg>
                    <span class="hidden sm:inline">{{ lang.t('feed.comment') }}</span>
                </button>

                <!-- Share — Button variant="ghost" -->
                <button type="button" class="inline-flex items-center justify-center gap-2 whitespace-nowrap rounded-lg text-sm font-medium
                     ring-offset-background transition-all duration-300
                     focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2
                     disabled:pointer-events-none disabled:opacity-50
                     hover:bg-accent hover:text-accent-foreground active:scale-[0.98]
                     px-4 py-2 h-10 flex-1">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 pointer-events-none shrink-0"
                        viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round">
                        <circle cx="18" cy="5" r="3" />
                        <circle cx="6" cy="12" r="3" />
                        <circle cx="18" cy="19" r="3" />
                        <line x1="8.59" x2="15.42" y1="13.51" y2="17.49" />
                        <line x1="15.41" x2="8.59" y1="6.51" y2="10.49" />
                    </svg>
                    <span class="hidden sm:inline">{{ lang.t('feed.share') }}</span>
                </button>
            </div>

            <!-- Bookmark — Button variant="ghost" size="icon" -->
            <button type="button" (click)="toggleSaved()" class="inline-flex items-center justify-center gap-2 whitespace-nowrap rounded-lg text-sm font-medium
                   ring-offset-background transition-all duration-300
                   focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2
                   disabled:pointer-events-none disabled:opacity-50
                   hover:bg-accent hover:text-accent-foreground active:scale-[0.98] h-10 w-10"
                [class.text-primary]="isSaved()">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" [class.fill-current]="isSaved()"
                    viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round">
                    <path d="m19 21-7-4-7 4V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v16z" />
                </svg>
            </button>
        </div>

        <!-- Comment input row -->
        @if (showComments()) {
        <div class="w-full flex items-center gap-2 pt-2 animate-fade-in">
            <div class="w-8 h-8 rounded-full overflow-hidden flex-shrink-0">
                <img src="https://images.unsplash.com/photo-1472099645785-5658abf4ff4e?w=100&h=100&fit=crop&crop=face"
                    alt="You" class="w-full h-full object-cover" />
            </div>
            <div class="flex-1 relative">
                <!-- Input variant="filled" inputSize="sm" rounded-full pr-10 -->
                <input type="text" placeholder="Write a comment..." class="flex w-full rounded-full border ring-offset-background transition-all duration-300
                       placeholder:text-muted-foreground focus-visible:outline-none
                       disabled:cursor-not-allowed disabled:opacity-50 md:text-sm
                       border-transparent bg-secondary
                       focus-visible:bg-background focus-visible:ring-2 focus-visible:ring-ring focus-visible:border-primary
                       h-9 text-sm px-3 pr-10 rtl:pr-3 rtl:pl-10" />
                <!-- Send button — Button variant="ghost" size="iconSm" absolute -->
                <button type="button" class="absolute right-1 rtl:right-auto rtl:left-1 top-1/2 -translate-y-1/2
                       inline-flex items-center justify-center gap-2 whitespace-nowrap rounded-lg
                       text-sm font-medium ring-offset-background transition-all duration-300
                       focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2
                       disabled:pointer-events-none disabled:opacity-50
                       hover:bg-accent hover:text-accent-foreground active:scale-[0.98] h-8 w-8">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 pointer-events-none shrink-0"
                        viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round">
                        <path d="m22 2-7 20-4-9-9-4Z" />
                        <path d="M22 2 11 13" />
                    </svg>
                </button>
            </div>
        </div>
        }
    </div>
</div>
