<app-comment-input [placeholder]="lang.t('feed.writeComment')" (submitted)="handleCommentSubmit($event)"></app-comment-input>

<div class="space-y-4 py-2 border-t border-border/40 mt-3">
  @for (comment of selectedComments(); track comment.id) {
  <app-comment-item [comment]="comment" [postId]="postId()" [contentType]="contentType()"></app-comment-item>
  }

  @if (hasMoreComments()) {
  <button (click)="loadMoreComments()" [disabled]="isLoadingMore()"
    class="w-full text-start px-3 py-1 text-sm font-semibold text-muted-foreground hover:underline transition-all cursor-pointer disabled:opacity-50 disabled:cursor-not-allowed">
    {{ isLoadingMore() ? 'Loading...' : 'View more comments' }}
  </button>
  }
</div>
