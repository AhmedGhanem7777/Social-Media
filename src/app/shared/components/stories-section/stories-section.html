<div class="w-full">
    <div class="flex gap-4 overflow-x-auto scrollbar-hide px-1 py-2">
        @for (story of stories; track story.id; let i = $index) {
        <button type="button" class="flex flex-col items-center gap-2 flex-shrink-0 group animate-fade-in"
            [style.animation-delay]="i * 50 + 'ms'">
            <div class="relative">
                <!-- Story ring -->
                <div class="rounded-full p-[3px] transition-transform duration-300 group-hover:scale-105"
                    [class]="storyRingClass(story)">
                    <div class="rounded-full bg-background p-[2px]">
                        <img [src]="story.avatar" [alt]="story.username" class="w-16 h-16 rounded-full object-cover" />
                    </div>
                </div>

                <!-- Add button for own story -->
                @if (story.isOwnStory) {
                <div class="absolute -bottom-1 -right-1 w-6 h-6 rounded-full bg-primary
                            flex items-center justify-center border-2 border-background shadow-lg">
                    <!-- Plus icon -->
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 text-primary-foreground" viewBox="0 0 24 24"
                        fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round">
                        <path d="M5 12h14" />
                        <path d="M12 5v14" />
                    </svg>
                </div>
                }

                <!-- Online indicator -->
                @if (!story.isOwnStory && story.hasUnseenStory) {
                <div class="absolute bottom-0 right-0 w-4 h-4 rounded-full bg-green-500 border-2 border-background">
                </div>
                }
            </div>

            <span class="text-xs font-medium text-foreground max-w-16 truncate">
                {{ story.isOwnStory ? lang.t('feed.yourStory') : story.username }}
            </span>
        </button>
        }
    </div>
</div>
