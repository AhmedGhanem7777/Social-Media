<div class="backdrop fixed inset-0 bg-black/80 backdrop-blur-sm z-[100] flex items-center justify-center p-4 sm:p-6"
    (click)="onBackdropClick($event)">

    <div
        class="relative w-full max-w-4xl max-h-[90vh] flex flex-col items-center animate-in fade-in zoom-in duration-300">

        <!-- Close Button -->
        <button type="button" (click)="onClose()"
            class="cursor-pointer absolute -top-12 right-0 sm:-right-12 p-2 text-white/70 hover:text-white transition-colors focus:outline-none">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-8 h-8" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2">
                <path d="M18 6L6 18M6 6l12 12" />
            </svg>
        </button>

        <!-- Content Container -->
        <div class="w-full rounded-2xl shadow-2xl overflow-y-auto scrollbar-hide min-h-[300px] flex flex-col">
            @if (item()) {
            <div class="max-w-2xl mx-auto py-4 w-full">
                <app-post-card [post]="item()!"></app-post-card>
            </div>
            } @else {
            <div class="flex-1 flex flex-col items-center justify-center gap-3 py-10">
                <div class="w-12 h-12 border-4 border-primary/20 border-t-primary rounded-full animate-spin"></div>
                <p class="text-sm text-muted-foreground animate-pulse">{{ lang.t('common.loading') }}</p>
            </div>
            }
        </div>
    </div>
</div>
