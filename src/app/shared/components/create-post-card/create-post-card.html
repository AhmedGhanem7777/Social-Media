<!-- Card: variant="elevated" hover-lift -->
<div class="rounded-xl bg-card text-card-foreground shadow-soft transition-all duration-300 hover-lift">
    <!-- CardContent: p-4 -->
    <div class="p-4">
        <div class="flex items-center gap-3">
            <!-- Avatar w-12 h-12 ring-2 ring-primary/20 -->
            <div class="w-12 h-12 rounded-full ring-2 ring-primary/20 overflow-hidden flex-shrink-0">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-full h-full p-2.5 text-muted-foreground" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2" />
                    <circle cx="12" cy="7" r="4" />
                </svg>
            </div>
            <button type="button" class="flex-1 h-11 px-4 bg-secondary hover:bg-secondary/80 rounded-full
                   text-muted-foreground text-left rtl:text-right transition-colors text-sm">
                {{ lang.t('feed.createPost') }}
            </button>
        </div>

        <!-- Action buttons row -->
        <div class="flex items-center gap-2 mt-4 pt-4 border-t border-border">

            <!-- Live — Button variant="ghost" -->
            <button type="button" class="inline-flex items-center justify-center gap-2 whitespace-nowrap rounded-lg text-sm font-medium
                   ring-offset-background transition-all duration-300
                   focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2
                   disabled:pointer-events-none disabled:opacity-50
                   hover:bg-accent hover:text-accent-foreground active:scale-[0.98]
                   px-4 py-2 h-10 flex-1 text-muted-foreground hover:text-foreground">
                <!-- Video icon -->
                <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-red-500 pointer-events-none shrink-0"
                    viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round">
                    <path d="m22 8-6 4 6 4V8Z" />
                    <rect width="14" height="12" x="2" y="6" rx="2" ry="2" />
                </svg>
                <span class="hidden sm:inline">Live</span>
            </button>

            <!-- Photo — Button variant="ghost" -->
            <button type="button" class="inline-flex items-center justify-center gap-2 whitespace-nowrap rounded-lg text-sm font-medium
                   ring-offset-background transition-all duration-300
                   focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2
                   disabled:pointer-events-none disabled:opacity-50
                   hover:bg-accent hover:text-accent-foreground active:scale-[0.98]
                   px-4 py-2 h-10 flex-1 text-muted-foreground hover:text-foreground">
                <!-- Image icon -->
                <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-green-500 pointer-events-none shrink-0"
                    viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round">
                    <rect width="18" height="18" x="3" y="3" rx="2" ry="2" />
                    <circle cx="9" cy="9" r="2" />
                    <path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21" />
                </svg>
                <span class="hidden sm:inline">Photo</span>
            </button>

            <!-- Feeling — Button variant="ghost" -->
            <button type="button" class="inline-flex items-center justify-center gap-2 whitespace-nowrap rounded-lg text-sm font-medium
                   ring-offset-background transition-all duration-300
                   focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2
                   disabled:pointer-events-none disabled:opacity-50
                   hover:bg-accent hover:text-accent-foreground active:scale-[0.98]
                   px-4 py-2 h-10 flex-1 text-muted-foreground hover:text-foreground">
                <!-- Smile icon -->
                <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-yellow-500 pointer-events-none shrink-0"
                    viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10" />
                    <path d="M8 13s1.5 2 4 2 4-2 4-2" />
                    <line x1="9" x2="9.01" y1="9" y2="9" />
                    <line x1="15" x2="15.01" y1="9" y2="9" />
                </svg>
                <span class="hidden sm:inline">Feeling</span>
            </button>

            <!-- Location — Button variant="ghost" -->
            <button type="button" class="inline-flex items-center justify-center gap-2 whitespace-nowrap rounded-lg text-sm font-medium
                   ring-offset-background transition-all duration-300
                   focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2
                   disabled:pointer-events-none disabled:opacity-50
                   hover:bg-accent hover:text-accent-foreground active:scale-[0.98]
                   px-4 py-2 h-10 flex-1 text-muted-foreground hover:text-foreground">
                <!-- MapPin icon -->
                <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-blue-500 pointer-events-none shrink-0"
                    viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round">
                    <path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z" />
                    <circle cx="12" cy="10" r="3" />
                </svg>
                <span class="hidden sm:inline">Location</span>
            </button>

        </div>
    </div>
</div>
