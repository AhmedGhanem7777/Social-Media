<aside class="hidden lg:flex flex-col w-64 h-[calc(100vh-4rem)] fixed top-16 start-0
                  bg-sidebar border-e border-sidebar-border overflow-y-auto scrollbar-thin">
    <div class="flex flex-col gap-2 p-4">

        <!-- Main Nav -->
        <nav class="space-y-1">
            @for (item of mainNavItems; track item.path) {
            <a [routerLink]="item.path" class="block">
                <button type="button" class="w-full justify-start gap-3 h-11 inline-flex items-center whitespace-nowrap rounded-lg
                       text-sm font-medium ring-offset-background transition-all duration-300
                       focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2
                       disabled:pointer-events-none disabled:opacity-50 px-4 py-2" [class]="isActive(item.path)
                  ? 'bg-gradient-primary text-white shadow-glow hover:opacity-90 active:scale-[0.98]'
                  : 'hover:bg-accent hover:text-accent-foreground active:scale-[0.98]'">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 pointer-events-none shrink-0"
                        viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round">
                        @switch (item.icon) {
                        @case ('home') {
                        <path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
                        <polyline points="9 22 9 12 15 12 15 22" />
                        }
                        @case ('film') {
                        <rect width="18" height="18" x="3" y="3" rx="2" />
                        <path d="M7 3v18M17 3v18M3 7h4M17 7h4M3 12h18M3 17h4M17 17h4" />
                        }
                        @case ('message') {
                        <path d="M7.9 20A9 9 0 1 0 4 16.1L2 22Z" />
                        }
                        @case ('user') {
                        <path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2" />
                        <circle cx="12" cy="7" r="4" />
                        }
                        @case ('bookmark') {
                        <path d="m19 21-7-4-7 4V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v16z" />
                        }
                        @case ('users') {
                        <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2" />
                        <circle cx="9" cy="7" r="4" />
                        <path d="M22 21v-2a4 4 0 0 0-3-3.87" />
                        <path d="M16 3.13a4 4 0 0 1 0 7.75" />
                        }
                        @case ('settings') {
                        <path
                            d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z" />
                        <circle cx="12" cy="12" r="3" />
                        }
                        }
                    </svg>
                    {{ lang.t(item.label) }}
                </button>
            </a>
            }
        </nav>

        <!-- Separator -->
        <div class="my-3 h-px bg-border"></div>

        <!-- Secondary Nav -->
        <nav class="space-y-1">
            @for (item of secondaryNavItems; track item.path) {
            <a [routerLink]="item.path" class="block">
                <button type="button" class="w-full justify-start gap-3 h-11 inline-flex items-center whitespace-nowrap rounded-lg
                       text-sm font-medium ring-offset-background transition-all duration-300
                       focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2
                       disabled:pointer-events-none disabled:opacity-50 px-4 py-2
                       hover:bg-accent hover:text-accent-foreground active:scale-[0.98]"
                    [class.bg-sidebar-accent]="isActive(item.path)"
                    [class.text-sidebar-accent-foreground]="isActive(item.path)">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 pointer-events-none shrink-0"
                        viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round">
                        @switch (item.icon) {
                        @case ('bookmark') {
                        <path d="m19 21-7-4-7 4V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v16z" />
                        }
                        @case ('users') {
                        <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2" />
                        <circle cx="9" cy="7" r="4" />
                        <path d="M22 21v-2a4 4 0 0 0-3-3.87" />
                        <path d="M16 3.13a4 4 0 0 1 0 7.75" />
                        }
                        @case ('settings') {
                        <path
                            d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z" />
                        <circle cx="12" cy="12" r="3" />
                        }
                        }
                    </svg>
                    {{ lang.t(item.label) }}
                </button>
            </a>
            }
        </nav>

        <!-- Separator -->
        <div class="my-3 h-px bg-border"></div>

        <!-- Suggested Users -->
        <div class="space-y-3">
            <h3 class="text-sm font-semibold text-muted-foreground px-2">Suggested for you</h3>

            @for (user of suggestedUsers(); track user._id) {
            <a [routerLink]="'/user/' + user._id"
                class="flex items-center gap-3 p-2 rounded-lg hover:bg-sidebar-accent transition-colors group">
                <div class="w-10 h-10 rounded-full ring-2 ring-transparent group-hover:ring-primary/30
                          transition-all overflow-hidden flex-shrink-0">
                    <img [src]="user.profilePicture || 'https://images.unsplash.com/photo-1472099645785-5658abf4ff4e?w=100&h=100&fit=crop&crop=face'" [alt]="user.displayName" class="w-full h-full object-cover" />
                </div>
                <div class="flex-1 min-w-0">
                    <p class="text-sm font-medium truncate">{{ user.displayName }}</p>
                    <p class="text-xs text-muted-foreground truncate">{{ user.username }}</p>
                </div>

                <button type="button" class="opacity-0 group-hover:opacity-100 transition-opacity
                       inline-flex items-center justify-center gap-2 whitespace-nowrap rounded-md text-sm font-medium
                       ring-offset-background transition-all duration-300
                       focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2
                       disabled:pointer-events-none disabled:opacity-50
                       border border-input bg-background hover:bg-accent hover:text-accent-foreground active:scale-[0.98]
                       h-9 px-3">
                    Follow
                </button>
            </a>
            }
        </div>

    </div>
</aside>
