<nav class="fixed bottom-0 left-0 right-0 z-50 lg:hidden glass border-t border-border/50 bottom-nav-safe">
    <div class="flex items-center justify-around h-16 px-2">

        @for (item of navItems; track item.path) {
        @if (item.isCreate) {
        <!-- Create button — gradient circle -->
        <a [routerLink]="item.path" class="flex flex-col items-center justify-center">
            <div class="w-12 h-12 rounded-full bg-gradient-primary flex items-center justify-center
                          shadow-glow -mt-4 hover:scale-110 active:scale-95 transition-transform">
                <!-- PlusCircle icon -->
                <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6 text-white" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10" />
                    <path d="M8 12h8" />
                    <path d="M12 8v8" />
                </svg>
            </div>
        </a>
        } @else {
        <a [routerLink]="item.path"
            class="flex flex-col items-center justify-center gap-1 flex-1 py-2 transition-all duration-200"
            [class]="isActive(item.path) ? 'text-primary' : 'text-muted-foreground hover:text-foreground'">
            <div class="relative">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6 transition-transform"
                    [class.scale-110]="isActive(item.path)" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                    stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <ng-container [ngSwitch]="item.path">
                        @switch (item.path) {
                        @case ('/') {
                        <!-- Home -->
                        <path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
                        <polyline points="9 22 9 12 15 12 15 22" />
                        }
                        @case ('/reels') {
                        <!-- Film -->
                        <rect width="18" height="18" x="3" y="3" rx="2" />
                        <path d="M7 3v18M17 3v18M3 7h4M17 7h4M3 12h18M3 17h4M17 17h4" />
                        }
                        @case ('/chat') {
                        <!-- MessageCircle -->
                        <path d="M7.9 20A9 9 0 1 0 4 16.1L2 22Z" />
                        }
                        @case ('/profile') {
                        <!-- User -->
                        <path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2" />
                        <circle cx="12" cy="7" r="4" />
                        }
                        }
                    </ng-container>
                </svg>
                @if (isActive(item.path)) {
                <div class="absolute -bottom-1 left-1/2 -translate-x-1/2 w-1 h-1 rounded-full bg-primary"></div>
                }
            </div>
            <span class="text-[10px] font-medium">{{ lang.t(item.label) }}</span>
        </a>
        }
        }

    </div>
</nav>
