<div class="fixed inset-0 z-[60] flex items-center justify-center p-4 sm:p-6 animate-fade-in mask-blur">
    <!-- Backdrop -->
    <div class="absolute inset-0 bg-background/80 backdrop-blur-sm" (click)="onClose()"></div>

    <!-- Modal Container -->
    <div
        class="relative w-full max-w-md bg-card border border-border rounded-2xl shadow-2xl overflow-hidden animate-scale-in glass">
        <!-- Header -->
        <div class="flex items-center justify-between p-4 border-b border-border bg-muted/30">
            <h2 class="text-lg font-semibold">{{ title() }}</h2>
            <button type="button" (click)="onClose()"
                class="w-8 h-8 flex items-center justify-center rounded-full hover:bg-accent transition-colors cursor-pointer">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M18 6 6 18" />
                    <path d="m6 6 12 12" />
                </svg>
            </button>
        </div>

        <!-- Content -->
        <div class="max-h-[60vh] overflow-y-auto p-2 space-y-1 scrollbar-thin">
            @for (user of users(); track user.userId) {
            <div class="flex items-center gap-3 p-2 rounded-xl hovrer:bg-accent/50 transition-all group cursor-pointer">
                <div
                    class="w-12 h-12 rounded-full ring-2 ring-primary/10 group-hover:ring-primary/30 transition-all overflow-hidden flex-shrink-0">
                    @if (user.profilePicture) {
                    <img [src]="user.profilePicture" [alt]="user.displayName" class="w-full h-full object-cover" />
                    } @else {
                    <div class="w-full h-full bg-muted flex items-center justify-center text-muted-foreground p-2">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-full h-full">
                            <path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2" />
                            <circle cx="12" cy="7" r="4" />
                        </svg>
                    </div>
                    }
                </div>
                <div class="flex-1 min-w-0">
                    <p class="font-semibold text-sm truncate">{{ user.displayName }}</p>
                </div>
                <!-- <button type="button" (click)="navigateToProfile(user.userId)" -->
                <button (click)="navigateToProfile(user.userId)" type="button" class="px-4 py-1.5 rounded-lg text-xs font-medium border border-border cursor-pointer hover:bg-accent
                transition-colors active:scale-95">
                    View Profile
                </button>
            </div>
            } @empty {
            <div class="py-12 flex flex-col items-center justify-center text-muted-foreground">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-12 h-12 mb-2 opacity-20" viewBox="0 0 24 24"
                    fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2" />
                    <circle cx="9" cy="7" r="4" />
                    <path d="M22 21v-2a4 4 0 0 0-3-3.87" />
                    <path d="M16 3.13a4 4 0 0 1 0 7.75" />
                </svg>
                <p class="text-sm">No users found</p>
            </div>
            }
        </div>
    </div>
</div>
